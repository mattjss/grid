<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300&display=swap" rel="stylesheet">
  <style>
    :root { --sz: 422px; }
    @media (min-width: 1440px) { :root { --sz: 576px; } }
    @media (max-width: 480px)  { :root { --sz: 322px; } }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; background: #101010;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; font-family: system-ui, sans-serif; cursor: none;
    }
    #wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    canvas {
      width: var(--sz); height: var(--sz);
      display: block;
    }
    #meta { display: flex; align-items: center; gap: 24px; }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="c"></canvas>
  </div>
<script>
  const SZ   = 422;
  const COLS = 25, ROWS = 25;
  const PAD  = 20;
  const GAP  = (SZ - PAD * 2) / (COLS - 1);
  const LEN  = 9;

  const canvas = document.getElementById('c');
  canvas.width = canvas.height = SZ;
  const ctx = canvas.getContext('2d');

  const ticks = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = PAD + c * GAP;
      const y = PAD + r * GAP;
      ticks.push({ x, y, angle: Math.PI / 2, vel: 0 });
    }
  }

  let mx = SZ / 2, my = SZ / 2, isInside = false;

  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mx = (e.clientX - r.left) * (SZ / r.width);
    my = (e.clientY - r.top)  * (SZ / r.height);
    isInside = true;
    maybeTick(e.clientX, e.clientY);
  });
  canvas.addEventListener('mouseenter', () => isInside = true);
  canvas.addEventListener('mouseleave', () => isInside = false);

  canvas.addEventListener('pointerdown', e => {
    const r = canvas.getBoundingClientRect();
    const cx = (e.clientX - r.left) * (SZ / r.width);
    const cy = (e.clientY - r.top)  * (SZ / r.height);
    ticks.forEach(t => {
      const dx = t.x - cx, dy = t.y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy) + 1;
      const str = Math.min(5.5 / dist, 0.9);
      const delay = (dist / SZ) * 700;
      setTimeout(() => { t.vel += str * (Math.random() < 0.5 ? 1 : -1); }, delay);
    });
    playClick();
  });

  function wrapAngle(a) {
    while (a >  Math.PI) a -= Math.PI * 2;
    while (a < -Math.PI) a += Math.PI * 2;
    return a;
  }

  function update() {
    ticks.forEach(t => {
      const target = isInside
        ? Math.atan2(my - t.y, mx - t.x)
        : Math.PI / 2;
      const diff = wrapAngle(target - t.angle);
      t.vel += diff * 0.18;
      t.vel *= 0.72;
      t.angle += t.vel;
    });
  }

  function draw() {
    ctx.fillStyle = '#101010';
    ctx.fillRect(0, 0, SZ, SZ);

    ticks.forEach(t => {
      let alpha = 0.14, lenMult = 1, lineW = 1;
      if (isInside) {
        const dx = t.x - mx, dy = t.y - my;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const prox = Math.max(0, 1 - dist / 155);
        alpha   = 0.14 + prox * 0.72;
        lenMult = 1 + prox * 1.6;
        lineW   = 1 + prox * 0.7;
      }
      const activity = Math.min(Math.abs(t.vel) * 6, 1);
      alpha   = Math.max(alpha,   0.14 + activity * 0.55);
      lenMult = Math.max(lenMult, 1    + activity * 0.6);

      const halfLen = (LEN / 2) * lenMult;
      const cos = Math.cos(t.angle), sin = Math.sin(t.angle);
      const x0 = t.x - cos * halfLen, y0 = t.y - sin * halfLen;
      const x1 = t.x + cos * halfLen, y1 = t.y + sin * halfLen;

      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1, y1);
      ctx.strokeStyle = `rgba(255,255,255,${alpha.toFixed(3)})`;
      ctx.lineWidth = lineW;
      ctx.lineCap = 'round';
      ctx.stroke();
    });

    if (isInside) {
      // Radial glow halo
      const grad = ctx.createRadialGradient(mx, my, 0, mx, my, 62);
      grad.addColorStop(0, 'rgba(255,255,255,0.07)');
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.beginPath();
      ctx.arc(mx, my, 62, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
      // Cursor dot
      ctx.beginPath();
      ctx.arc(mx, my, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.fill();
    }
  }

  // ── Audio ─────────────────────────────────────────────────────
  let hoverAudio = null, clickAudio = null;
  function initAudio() {
    if (hoverAudio) return;
    hoverAudio = new Audio('./sounds/selection.mp3');
    hoverAudio.volume = 0.06;
    clickAudio = new Audio('./sounds/selection.mp3');
    clickAudio.volume = 0.42;
  }
  function playHover() {
    initAudio();
    hoverAudio.currentTime = 0;
    hoverAudio.play().catch(() => {});
  }
  function playClick() {
    initAudio();
    clickAudio.currentTime = 0;
    clickAudio.play().catch(() => {});
  }

  let lastTick = { x: 0, y: 0 }, lastTickMs = 0;
  function maybeTick(x, y) {
    const dx = x - lastTick.x, dy = y - lastTick.y;
    if (dx * dx + dy * dy < 48 * 48) return;
    const now = performance.now();
    if (now - lastTickMs < 220) return;
    lastTick = { x, y }; lastTickMs = now;
    playHover();
  }

  (function loop() { update(); draw(); requestAnimationFrame(loop); })();
</script>
</body>
</html>
